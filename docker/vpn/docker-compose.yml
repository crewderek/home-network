volumes:
  etc_wireguard:

services:
  wg-easy:
    #environment:
    #  Optional:
    #  - PORT=51821
    #  - HOST=0.0.0.0
    #  - INSECURE=false

    image: ghcr.io/wg-easy/wg-easy:15
    environment:
#          - HOST=${WG_HOST}
#          - PASSWORD=${WG_PASSWORD}
          - PORT=51820
    networks:
      - vpn-internal-network
    volumes:
      - etc_wireguard:/etc/wireguard
      - /lib/modules:/lib/modules:ro
    ports:
      # Use "host" mode to bypass the Swarm mesh for performance/stability
      - target: 51820
        published: 51820
        protocol: udp
        mode: host
      - target: 51821
        published: 51821
        protocol: tcp
        mode: host
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
#      - net.ipv6.conf.all.disable_ipv6=1
#      - net.ipv6.conf.all.forwarding=1
#      - net.ipv6.conf.default.forwarding=0
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.labels.type != restricted
      resources:
        limits:
          memory: 256M

networks:
  vpn-internal-network:
    driver: overlay
    ipam:
      driver: default
      config:
        - subnet: 10.42.42.0/24