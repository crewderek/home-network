networks:
  smart-home-network:
    driver: overlay
    attachable: true
    name: smart-home-network
  dns_network:
    external: true
    name: dns_dns_net
  proxy_private:
    external: true
    name: proxy_private

volumes:
  mosquitto_nfs:
    driver: local
    driver_opts:
      type: nfs
      o: "addr=${NFS_ADDRESS},nfsvers=3,nolock,soft,rw"
      device: ":${MOSQUITTO_NFS_DIRECTORY}"