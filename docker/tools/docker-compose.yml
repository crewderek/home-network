version: '3.8'

services:
  it-tools:
    image: corentinth/it-tools:2024.10.22-7ca5933
    networks:
      - proxy_private
      - tools
#    ports:
#      - target: 80
#        published: 8080
#        protocol: tcp
#        mode: host
    deploy:
      mode: replicated
      replicas: 1
#      placement:
#        constraints:
#          - node.role == worker
      restart_policy:
        condition: on-failure


#################### Heimdall #######################################
  heimdall:
    image: lscr.io/linuxserver/heimdall:2.7.6
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Denver
    volumes:
      - heimdall_nfs:/config:subpath=config
    networks:
      - proxy_private
#    ports:
#      - "8080:80"
#      - "8443:443"
    deploy:
      mode: replicated
      replicas: 1
#      placement:
#        constraints:
#          - node.role == manager # Often best to keep dashboards on managers
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

########################## Excalidraw ############################3
  excalidraw:
    image: excalidraw/excalidraw:latest
#    ports:
#      - "5000:80"
    networks:
      - tools
    environment:
      # This tells the browser where to find the collaboration server
      # Replace 'excalidraw.yourdomain.com' with your actual IP or Domain
      - VITE_APP_WS_SERVER_URL=http://tools_excalidraw-room
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure

  # The Collaboration Backend (Socket server)
  excalidraw-room:
    image: excalidraw/excalidraw-room:latest
    networks:
      - tools
#    ports:
#      - "8081:8080"
    deploy:
      replicas: 1
#      placement:
#        constraints:
#          - node.role == worker # Can run anywhere
      restart_policy:
        condition: on-failure


networks:
    proxy_private:
      external: true
      name: proxy_private
    tools:
      name: tools-network
      driver: overlay
      attachable: true

volumes:
  heimdall_nfs:
    driver: local
    driver_opts:
      type: nfs
      o: "addr=${NFS_ADDRESS},nfsvers=3,nolock,soft,rw"
      device: ":${HEIMDALL_CONFIG_NFS_DIRECTORY}"