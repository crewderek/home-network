version: '3.8'

services:
  app:
    image: 'jc21/nginx-proxy-manager:latest'
    networks:
      - proxy_public
      - proxy_private
      - maria_db_net
    ports:
      - target: 80
        published: 18000
        protocol: tcp
        mode: ingress
      - target: 443
        published: 443
        protocol: tcp
        mode: ingress
      - target: 81
        published: 81
        protocol: tcp
        mode: ingress
    volumes:
      - /mnt/docker/node_proxy_manager/data:/data
      - /mnt/docker/node_proxy_manager/letsencrypt:/etc/letsencrypt
    environment:
      DB_MYSQL_HOST: "maria-db"
      DB_MYSQL_PORT: 3306
      DB_MYSQL_USER: "node_proxy_manager"
      DB_MYSQL_PASSWORD: /run/secrets/maria_db_user_node_proxy_manager_password
      DB_MYSQL_NAME: "node_proxy_manager"
    deploy:
      placement:
        constraints: [node.role == manager]

networks:
  proxy_public:
    driver: overlay
    attachable: true
    name: proxy_public
  proxy_private:
    driver: overlay
    attachable: true
    name: proxy_private
  maria_db_net:
    external: true
    name: database_maria_db_net