version: '3.8'

services:
  nginx_proxy_manager:
    image: 'jc21/nginx-proxy-manager:2.14.0'
    networks:
      - proxy_public
      - proxy_private
      - maria_db_net
      - dns_network
      - vpn_network
      - business_network
      - immich_network
    ports:
#      - target: 80
#        published: 80
#        protocol: tcp
#        mode: ingress
      - target: 443
        published: 443
        protocol: tcp
        mode: ingress
      - target: 81
        published: 81
        protocol: tcp
        mode: ingress
      - target: 1883
        published: 1883
        protocol: tcp
        mode: ingress
      - target: 5683
        published: 5683
        protocol: udp
        mode: ingress
#      - target: 51820
#        published: 51820
#        protocol: udp
#        mode: ingress
    volumes:
      - nginx_nfs:/data:subpath=data
      - nginx_nfs:/etc/letsencrypt:subpath=letsencrypt
    environment:
      DB_MYSQL_HOST: "maria-db"
      DB_MYSQL_PORT: 3306
      DB_MYSQL_USER: "node_proxy_manager"
      DB_MYSQL_PASSWORD: /run/secrets/maria_db_user_node_proxy_manager_password
      DB_MYSQL_NAME: "node_proxy_manager"
      PUID: 1000
      PGID: 1000
      TZ: America/Denver
    deploy:
      placement:
        constraints: [node.role == manager]

  traefik:
    image: traefik:v3.6.13
    command:
      # Enable Docker Swarm mode
      - "--log.level=DEBUG"
      - "--providers.swarm.endpoint=unix:///var/run/docker.sock"
      - "--providers.swarm.watch=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=proxy-private"
      - "--api.dashboard=true"
      # Entrypoints for HTTP and HTTPS
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      # (Optional) Automatic SSL via Let's Encrypt
      - "--certificatesresolvers.mydnschallenge.acme.dnschallenge=true"
      - "--certificatesresolvers.mydnschallenge.acme.dnschallenge.provider=route53"
#      - "--certificatesresolvers.mydnschallenge.acme.email="
      - "--certificatesresolvers.mydnschallenge.acme.storage=/letsencrypt/acme.json"
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_KEY}
      - AWS_REGION=${AWS_REGION} # Or your specific region
      - AWS_HOSTED_ZONE_ID=${HOSTED_ZONE_ID}
      - TRAEFIK_CERTIFICATESRESOLVERS_MYDNSCHALLENGE_ACME_EMAIL=${ACME_EMAIL}
    ports:
      - "9888:80"
      - "9883:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - lets-encrypt-data:/letsencrypt
    networks:
      - proxy_private
      - proxy_public
    deploy:
      placement:
        constraints:
          - node.role == manager

networks:
  proxy_public:
    driver: overlay
    attachable: true
    name: proxy_public
  proxy_private:
    driver: overlay
    attachable: true
    name: proxy_private
  maria_db_net:
    external: true
    name: database_maria_db_net
  dns_network:
    external: true
    name: dns_dns_net
  vpn_network:
    driver: overlay
    attachable: true
    name: vpn_network
  business_network:
    external: true
    name: business-network
  immich_network:
    external: true
    name: immich-network

volumes:
  nginx_nfs:
    driver: local
    driver_opts:
      type: nfs
      o: "addr=${NFS_ADDRESS},nfsvers=3,nolock,soft,rw"
      device: ":${PROXY_DATA_NFS_DIRECTORY}"
  lets-encrypt-data:
    driver: local