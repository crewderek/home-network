version: '3.8'

services:
  adguard:
    image: adguard/adguardhome:v0.107.71
    hostname: adguard-dns
    environment:
      # Find your PUID and PGID by running "id $user" in your terminal
      - PUID=1000
      - PGID=1000
      - TZ=America/Denver # Replace with your timezone
    networks:
      - dns_net
    volumes:
      - adguard_config:/opt/adguardhome/conf
      - adguard_work:/opt/adguardhome/work
    ports:
      # Host mode ensures you see client IPs in the dashboard
      - target: 53
        published: 53
        protocol: udp
        mode: host
      - target: 53
        published: 53
        protocol: tcp
        mode: host
      # Setup/Web UI
      - target: 3000
        published: 3000
        protocol: tcp
      - target: 80
        published: 80
        protocol: tcp
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          # This ensures it ONLY runs on the labeled node
          - node.labels.type == DNS
      restart_policy:
        condition: on-failure

networks:
  dns_net:
    driver: overlay
    attachable: true

volumes:
  adguard_config:
    driver: local
    driver_opts:
      type: nfs
      o: "addr=${NFS_ADDRESS},nfsvers=4,nolock,soft,rw" # Replace with your NFS Server IP
      device: ":${CONFIG_NFS_DIRECTORY}"
  adguard_work:
    driver: local
    driver_opts:
      type: nfs
      o: "addr=${NFS_ADDRESS},nfsvers=4,nolock,soft,rw" # Replace with your NFS Server IP
      device: ":${WORK_NFS_DIRECTORY}"