version: '3.8'

services:
  adguard:
    image: adguard/adguardhome:v0.107.71
    hostname: adguard-dns
    networks:
      - dns_net
#    volumes:
#          # Long syntax to use a subpath inside an external volume
#          - type: volume
#            source: nfs_volume
#            target: /opt/adguardhome/conf
#            volume:
#              subpath: adguard/config
#          - type: volume
#            source: nfs_volume
#            target: /opt/adguardhome/work
#            volume:
#              subpath: adguard/work
    ports:
      # Host mode ensures you see client IPs in the dashboard
      - target: 53
        published: 53
        protocol: udp
        mode: host
      - target: 53
        published: 53
        protocol: tcp
        mode: host
      # Setup/Web UI
      - target: 3000
        published: 3000
        protocol: tcp
      - target: 80
        published: 80
        protocol: tcp
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          # This ensures it ONLY runs on the labeled node
          - node.labels.type == DNS
      restart_policy:
        condition: on-failure

networks:
  dns_net:
    driver: overlay
    attachable: true

