version: '3.8'

services:
  redis:
    image: redis:alpine
    networks:
      - next-cloud
    deploy:
      replicas: 1

  app:
    image: nextcloud:${NEXTCLOUD_VERSION}
    ports:
      - 8888:80
    volumes:
      - next-cloud-nfs:/var/www/html
      - next-cloud-nfs:/var/www/html/custom_apps:subpath=custom_apps
      - next-cloud-nfs:/var/www/html/config:subpath=config
      - next-cloud-nfs:/var/www/html/data:subpath=data
#      - next-cloud-nfs:/var/www/html/theme:subpath=theme
#      - /mnt/docker/next-cloud:/var/www/html
#      - /mnt/docker/next-cloud/custom_apps:/var/www/html/custom_apps
#      - /mnt/docker/next-cloud/config:/var/www/html/config
#      - /mnt/docker/next-cloud/data:/var/www/html/data
#      - /mnt/docker/next-cloud/themes:/var/www/html/themes
    environment:
      - POSTGRES_HOST=${DB_HOST}
      - POSTGRES_DB=next_cloud
      - POSTGRES_USER=next_cloud
      - POSTGRES_PASSWORD=${DB_PASSWORD}
#      - POSTGRES_PASSWORD_FILE=/run/secrets/db_password
      - REDIS_HOST=redis
      - NEXTCLOUD_ADMIN_USER=admin
#      - NEXTCLOUD_ADMIN_PASSWORD_FILE=/run/secrets/nextcloud_admin_password
      - NEXTCLOUD_ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - NEXTCLOUD_TRUSTED_DOMAINS=${TRUSTED_DOMAINS}
      - APACHE_SERVERNAME=${TRUSTED_DOMAINS}
      - POSTGRES_SSLMODE=prefer
      - PUID=33
      - PGID=33
      - TZ=America/Denver
    secrets:
      - db_password
      - nextcloud_admin_password
    networks:
      - proxy-private
      - next-cloud
    depends_on:
      - redis
    deploy:
      replicas: 1 # Scale horizontally across the swarm
#      update_config:
#        parallelism: 1
#        delay: 10s

networks:
  next-cloud:
    driver: overlay
    name: next-cloud-network
  proxy-private:
    external: true
    name: proxy_private

secrets:
  db_password:
    external: true
    name: next-cloud-db-password
  nextcloud_admin_password:
    external: true
    name: next-cloud-admin-password

volumes:
  next-cloud-nfs:
    driver: local
    driver_opts:
      type: nfs
      o: "addr=${NFS_ADDRESS},nfsvers=3,nolock,soft,rw"
      device: ":${NEXT_CLOUD_NFS_DIRECTORY}"