version: '3.8'

services:
  redis:
    image: redis:alpine
    networks:
      - next-cloud
    deploy:
      replicas: 1

  app:
    image: linuxserver/nextcloud:${NEXTCLOUD_VERSION}
#    ports:
#      - 8080:80
    volumes:
      - /mnt/docker/next-cloud:/var/www/html
    environment:
      - MYSQL_HOST=${DB_HOST}
      - MYSQL_DATABASE=next_cloud
      - MYSQL_USER=next_cloud
      - MYSQL_PASSWORD_FILE=/run/secrets/db_password
      - REDIS_HOST=redis
      - NEXTCLOUD_ADMIN_USER=admin
      - NEXTCLOUD_ADMIN_PASSWORD_FILE=/run/secrets/nextcloud_admin_password
      - PUID=33
      - PGID=33
      - TZ=America/Denver
    secrets:
      - db_password
      - nextcloud_admin_password
    networks:
      - proxy-private
      - next-cloud
    depends_on:
      - redis
    deploy:
      replicas: 1 # Scale horizontally across the swarm
#      update_config:
#        parallelism: 1
#        delay: 10s

networks:
  next-cloud:
    driver: overlay
    name: next-cloud-network
  proxy-private:
    external: true
    name: proxy_private

secrets:
  db_password:
    external: true
    name: next-cloud-db-password
  nextcloud_admin_password:
    external: true
    name: next-cloud-admin-password