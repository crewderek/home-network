networks:
  arr_network:
    driver: overlay
    attachable: true
  proxy_private:
    external: true

volumes:
  arr-data:
    driver: local
    driver_opts:
      type: nfs
      o: "addr=${NFS_ADDRESS},nfsvers=4,nolock,soft,rw" # Replace with your NFS Server IP
      device: ":${ARR_NFS_DIRECTORY}"