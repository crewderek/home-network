#          - node.hostname == vpn-node-01 # Keep qbit and vpn on same node

  # INDEXER MANAGER
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:2.3.5
    networks:
      - arr_network
#    ports:
#      - 9696:9696
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - type: volume
        source: arr-data
        target: /config
        volume:
          subpath: prowlarr/config
          nocopy: true
    deploy:
      labels:
        - "traefik.enable=true"
        #        # The URL you will use to access Nextcloud
        - "traefik.http.routers.prowlarr.rule=Host(`${PROWLARR_SUBDOMAIN}.${BASE_DOMAIN}`)"
        - "traefik.http.routers.prowlarr.entrypoints=websecure"
        - "traefik.http.routers.prowlarr.tls=true"
        - "traefik.http.routers.prowlarr.tls.certresolver=mydnschallenge"
        #        # Critical for Swarm: Specify the internal container port
        - "traefik.http.services.prowlarr.loadbalancer.server.port=9696"
        #        # Ensure Traefik uses the correct network for routing
        - "traefik.docker.network=proxy_private"
        # This line is key: it tells Traefik to look for the cert containing these domains
        - "traefik.http.routers.prowlarr.tls.domains[0].main=${BASE_DOMAIN}"
        - "traefik.http.routers.prowlarr.tls.domains[0].sans=*.${BASE_DOMAIN}"
      replicas: 1
      placement:
        constraints:
          - node.labels.docker_mount == true
          - node.labels.type != restricted
