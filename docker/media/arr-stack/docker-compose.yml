#          - node.role == worker # Or pick a specific node name

  # DOWNLOADER
  # Note: Swarm doesn't support network_mode: service:gluetun.
  # For Swarm, it is standard practice to run the VPN and Client
  # in a single custom image or via a sidecar pod-like structure.
  # However, for a home lab, the most stable Swarm approach is
  # keeping them as separate services on the same network:
#  qbittorrent:
#    image: lscr.io/linuxserver/qbittorrent:latest
#    environment:
#      - PUID=1000
#      - PGID=1000
#      - WEBUI_PORT=8080
#    volumes:
#      - /mnt/shared/config/qbittorrent:/config
#      - /mnt/shared/data/downloads:/data/downloads
#    networks:
#      - arr_network
#    deploy:
#      placement:
#        constraints:
#          - node.hostname == vpn-node-01 # Keep qbit and vpn on same node

  # INDEXER MANAGER
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:2.3.5
    networks:
      - arr_network
      - proxy_private
#    ports:+
#      - 9696:9696
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Denver
    volumes:
      - type: volume
        source: arr-data
        target: /config
        volume:
          subpath: prowlarr/config
          nocopy: true
    deploy:
      labels:
        - "traefik.enable=true"
        #        # The URL you will use to access Nextcloud
        - "traefik.http.routers.prowlarr.rule=Host(`${PROWLARR_SUBDOMAIN}.${BASE_DOMAIN}`)"
        - "traefik.http.routers.prowlarr.entrypoints=websecure"
        - "traefik.http.routers.prowlarr.tls=true"
        - "traefik.http.routers.prowlarr.tls.certresolver=mydnschallenge"
        #        # Critical for Swarm: Specify the internal container port
        - "traefik.http.services.prowlarr.loadbalancer.server.port=9696"
        #        # Ensure Traefik uses the correct network for routing
        - "traefik.docker.network=proxy_private"
        # This line is key: it tells Traefik to look for the cert containing these domains
        - "traefik.http.routers.prowlarr.tls.domains[0].main=${BASE_DOMAIN}"
        - "traefik.http.routers.prowlarr.tls.domains[0].sans=*.${BASE_DOMAIN}"
      replicas: 1
      placement:
        constraints:
          - node.labels.docker_mount == true
          - node.labels.type != restricted
  # MOVIES
  radarr:
    image: lscr.io/linuxserver/radarr:6.1.1
    networks:
      - arr_network
      - proxy_private
#    ports:
#      - 7878:7878
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Denver
    volumes:
      - type: volume
        source: arr-data
        target: /config
        volume:
          subpath: radarr/config
          nocopy: true
#  -v /path/to/movies:/movies `#optional` \
#  -v /path/to/download-client-downloads:/downloads `#optional` \
    deploy:
      labels:
        - "traefik.enable=true"
        #        # The URL you will use to access Nextcloud
        - "traefik.http.routers.radarr.rule=Host(`${RADARR_SUBDOMAIN}.${BASE_DOMAIN}`)"
        - "traefik.http.routers.radarr.entrypoints=websecure"
        - "traefik.http.routers.radarr.tls=true"
        - "traefik.http.routers.radarr.tls.certresolver=mydnschallenge"
        #        # Critical for Swarm: Specify the internal container port
        - "traefik.http.services.radarr.loadbalancer.server.port=7878"
        #        # Ensure Traefik uses the correct network for routing
        - "traefik.docker.network=proxy_private"
        # This line is key: it tells Traefik to look for the cert containing these domains
        - "traefik.http.routers.radarr.tls.domains[0].main=${BASE_DOMAIN}"
        - "traefik.http.routers.radarr.tls.domains[0].sans=*.${BASE_DOMAIN}"
      replicas: 1
      placement:
        constraints:
          - node.labels.docker_mount == true
          - node.labels.type != restricted
