#      - TZ=Europe/London
#      - WEBUI_PORT=8080
#    networks:
#      - vpn_net
#    deploy:
#      placement:
#        constraints: [node.role == worker] # Must be same node as gluetun
#    depends_on:
#      - gluetun

networks:
  internal-only-vpn-network:
    driver: overlay
    internal: true  # STRICTLY isolated; no external ingress/egress
  public-vpn-network:
    driver: overlay
    internal: false # Standard network with internet access