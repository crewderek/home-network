networks:
  media_network:
    driver: overlay
    attachable: true
    name: media-network
  proxy_public:
    external: true
#  arr_network:
#    external: true
#    name: arr_arr_network
  proxy_private:
    external: true

volumes:
#  jellyfin_cache:
#    driver: local
  jellyseer_nfs:
    driver: local
    driver_opts:
      type: nfs
      o: "addr=${NFS_ADDRESS},nfsvers=3,nolock,soft,rw"
      device: ":${SEERR_CONF_NFS_DIRECTORY}"